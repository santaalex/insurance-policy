version: "3.8"

# ==============================================================
# 保单管理系统 - Docker Compose
# 包含: Dify (核心) + PDF解析服务 + 人员去重服务
# ==============================================================

services:

  # ---- Dify 依赖 ----

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-difypassword}
      POSTGRES_DB: dify
    volumes:
      - dify_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyredis}
    volumes:
      - dify_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.24.1
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - dify_weaviate_data:/var/lib/weaviate

  # ---- Dify 核心 ----

  dify-api:
    image: langgenius/dify-api:0.15.0
    restart: always
    environment:
      MODE: api
      SECRET_KEY: ${DIFY_SECRET_KEY:-please-change-this-secret-key-32chars}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-difypassword}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-difyredis}
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-difyredis}@redis:6379/1
      LOG_LEVEL: WARNING
      # LLM 配置 (支持通义千问 / OpenAI)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"

  dify-worker:
    image: langgenius/dify-api:0.15.0
    restart: always
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY:-please-change-this-secret-key-32chars}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-difypassword}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-difyredis}
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-difyredis}@redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dify-web:
    image: langgenius/dify-web:0.15.0
    restart: always
    environment:
      NEXTAUTH_SECRET_KEY: ${DIFY_SECRET_KEY:-please-change-this-secret-key-32chars}
      CONSOLE_API_URL: http://localhost:5001
      APP_API_URL: http://localhost:5001
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/dify.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - dify-api
      - dify-web

  # ---- 自定义服务 ----

  pdf-parser:
    build:
      context: ./services/pdf-parser
      dockerfile: Dockerfile
    restart: always
    environment:
      LLM_API_KEY: ${OPENAI_API_KEY:-}
      LLM_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - uploaded_pdfs:/app/uploads
    ports:
      - "8001:8001"

  identity-resolver:
    build:
      context: ./services/identity-resolver
      dockerfile: Dockerfile
    restart: always
    environment:
      LLM_API_KEY: ${OPENAI_API_KEY:-}
      LLM_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      DIFY_API_BASE: http://dify-api:5001
      DIFY_API_KEY: ${DIFY_APP_API_KEY:-}
    ports:
      - "8002:8002"
    depends_on:
      - dify-api

volumes:
  dify_db_data:
  dify_redis_data:
  dify_weaviate_data:
  dify_storage:
  uploaded_pdfs:
